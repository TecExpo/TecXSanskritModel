name: Publish Sanskrit Cleaner to PyPI
on:
  release:
    types: [published]
jobs:
  build-and-publish:
    name: Build and Upload to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org
    permissions:
      id-token: write # MANDATORY for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
