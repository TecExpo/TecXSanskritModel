name: Manual Model Rollback

on:
  workflow_dispatch: # This creates the "Run workflow" button
    inputs:
      reason:
        description: 'Reason for rollback'
        required: true
        default: 'Performance regression'

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into Sanskrit Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Initiating rollback for: ${{ github.event.inputs.reason }}"
            # Run the local rollback script on the server
            ./scripts/rollback_model.sh
